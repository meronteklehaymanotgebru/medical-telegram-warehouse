services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_warehouse
    ports:
      - "5433:5432"           # host:container – 5433 on your machine, 5432 inside Docker
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: